esphome:
  name: matrix-display
  friendly_name: Matrix Display

external_components:
  - source: github://w531t4/ESPHome-FPGA-MatrixDisplayWrapper@main

esp32:
  board: esp32dev
  framework:
    type: arduino

font:
  # gfonts://family[@weight]
  - file: "gfonts://Roboto"
    id: roboto
    size: 10

display:
  - platform: fpga_matrix_display
    id: matrix
    width: 64
    height: 32

    # Status readback SPI (optional): reads FPGA registers back over a second
    # SPI bus. Requires an FPGA bitstream built with USE_STATUS_SPI and all
    # three pins wired; omit all three to disable. Pin numbers are the ESP32
    # side of the fpga_led_display top-level status pins.
    # STATUS_SPI_SCK_pin: 1
    # STATUS_SPI_CS_pin: 2
    # STATUS_SPI_MISO_pin: 17

    lambda: |-
      it.print(0, 0, id(roboto), "Hello World!");

sensor:
  - platform: fpga_matrix_display
    matrix_id: matrix
    name: "Update Duration"
    id: matrix_update_duration
    update_interval: 20s
  # Rolling kB/s received by the FPGA, via the status readback SPI. Only
  # useful when the STATUS_SPI_*_pin options above are configured.
  # - platform: fpga_matrix_display
  #   matrix_id: matrix
  #   type: rx_kbps
  #   name: "FPGA RX Rate"

# FPGA status flags, polled over the status readback SPI. Only useful when
# the STATUS_SPI_*_pin options above are configured.
# binary_sensor:
#   - platform: fpga_matrix_display
#     matrix_id: matrix
#     name: "FPGA Ready"
#     type: fpga_ready
#     update_interval: 10s
#   - platform: fpga_matrix_display
#     matrix_id: matrix
#     name: "FPGA Controller Busy"
#     type: ctrl_busy
#   - platform: fpga_matrix_display
#     matrix_id: matrix
#     name: "FPGA Ready For Data"
#     type: ctrl_ready_for_data
    
switch:
  - platform: fpga_matrix_display
    matrix_id: matrix
    name: "Power"
    id: matrix_power
number:
  - platform: fpga_matrix_display
    matrix_id: matrix
    name: "Brightness"

light:
  - platform: fpga_matrix_display
    id: led_matrix_light
    name: "LED Matrix"
    matrix_id: matrix
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0ms
    gamma_correct: 1.0
    on_turn_on:
      - switch.turn_on: matrix_power
    on_turn_off:
      - switch.turn_off: matrix_power
